services:
  vite-app:
    build: .
    container_name: vite-container
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    networks:
      - simulation_network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-container
    ports:
      - "3200:3200"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - simulation_network
    command: npm run dev   # 🚨 ADD THIS LINE 🚨

networks:
  simulation_network:
    driver: bridge